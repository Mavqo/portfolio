# Improvement Teams Configuration
# Auto-Generated from analysis

teams:
  - name: modernization-team
    priority: 1
    agents:
      - senior-fullstack
      - frontend-developer
    tasks:
      - Update Astro 4.15 → 6.1.3
      - Update Tailwind CSS 3.4 → 4.2.2
      - Update Framer Motion 11 → 12.38
      - Fix breaking changes
    output: modernization-report.md

  - name: security-team
    priority: 2
    agents:
      - security-engineer
    tasks:
      - Fix npm vulnerabilities (npm audit fix)
      - Add security headers to nginx.conf
      - Add CSP configuration
      - Add .htaccess security (if Apache)
    output: security-audit.md

  - name: performance-team
    priority: 3
    agents:
      - senior-frontend
      - performance-benchmarker
    tasks:
      - Configure Sharp image optimization
      - Add @astrojs/prefetch
      - Implement lazy loading for images
      - Optimize fonts loading
    output: performance-report.md

  - name: quality-team
    priority: 4
    agents:
      - code-reviewer
      - refactor-cleaner
    tasks:
      - Configure ESLint with Astro plugin
      - Configure Prettier
      - Enable TypeScript strict mode
      - Add pre-commit hooks
    output: refactoring-report.md

  - name: testing-team
    priority: 5
    agents:
      - playwright-pro
    tasks:
      - Configure Playwright E2E tests
      - Add basic page tests
      - Add visual regression tests
      - Configure CI test runner
    output: test-configuration.md

execution_order:
  - modernization-team # Must be first (deps affect others)
  - security-team # Can run parallel after deps
  - performance-team # Depends on Astro version
  - quality-team # Independent
  - testing-team # Last (tests everything)
