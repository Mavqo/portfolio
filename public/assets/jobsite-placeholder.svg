<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 192" width="320" height="192">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#2d1b69"/>
    </linearGradient>
  </defs>
  <rect width="320" height="192" fill="url(#bg)"/>

  <!-- Phone frame -->
  <rect x="118" y="8" width="84" height="176" rx="12" ry="12" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1.5" opacity="0.9"/>

  <!-- Notch -->
  <rect x="140" y="12" width="40" height="6" rx="3" fill="#0f172a"/>

  <!-- Screen area -->
  <rect x="122" y="22" width="76" height="152" rx="4" fill="#111827"/>

  <!-- App header bar -->
  <rect x="122" y="22" width="76" height="22" rx="4" fill="#1e1b4b"/>
  <rect x="122" y="30" width="76" height="14" fill="#1e1b4b"/>
  <!-- Header text placeholder -->
  <rect x="130" y="28" width="42" height="5" rx="2" fill="#7c3aed" opacity="0.9"/>
  <!-- Header icon -->
  <rect x="180" y="27" width="12" height="7" rx="1.5" fill="#5b21b6" opacity="0.7"/>

  <!-- Divider -->
  <line x1="122" y1="44" x2="198" y2="44" stroke="#374151" stroke-width="0.5"/>

  <!-- Row 1 — checked -->
  <rect x="126" y="49" width="8" height="8" rx="2" fill="#7c3aed"/>
  <line x1="128" y1="53" x2="130" y2="55" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="130" y1="55" x2="133" y2="51" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="138" y="51" width="32" height="3.5" rx="1.5" fill="#6d28d9" opacity="0.8"/>
  <rect x="138" y="56" width="20" height="2.5" rx="1" fill="#374151"/>

  <!-- Divider -->
  <line x1="126" y1="63" x2="194" y2="63" stroke="#1f2937" stroke-width="0.5"/>

  <!-- Row 2 — checked -->
  <rect x="126" y="67" width="8" height="8" rx="2" fill="#7c3aed"/>
  <line x1="128" y1="71" x2="130" y2="73" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="130" y1="73" x2="133" y2="69" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="138" y="69" width="28" height="3.5" rx="1.5" fill="#6d28d9" opacity="0.8"/>
  <rect x="138" y="74" width="24" height="2.5" rx="1" fill="#374151"/>

  <!-- Divider -->
  <line x1="126" y1="81" x2="194" y2="81" stroke="#1f2937" stroke-width="0.5"/>

  <!-- Row 3 — unchecked -->
  <rect x="126" y="85" width="8" height="8" rx="2" fill="none" stroke="#4b5563" stroke-width="1.2"/>
  <rect x="138" y="87" width="36" height="3.5" rx="1.5" fill="#4b5563" opacity="0.7"/>
  <rect x="138" y="92" width="22" height="2.5" rx="1" fill="#374151"/>

  <!-- Divider -->
  <line x1="126" y1="99" x2="194" y2="99" stroke="#1f2937" stroke-width="0.5"/>

  <!-- Row 4 — unchecked -->
  <rect x="126" y="103" width="8" height="8" rx="2" fill="none" stroke="#4b5563" stroke-width="1.2"/>
  <rect x="138" y="105" width="30" height="3.5" rx="1.5" fill="#4b5563" opacity="0.7"/>
  <rect x="138" y="110" width="18" height="2.5" rx="1" fill="#374151"/>

  <!-- Divider -->
  <line x1="126" y1="117" x2="194" y2="117" stroke="#1f2937" stroke-width="0.5"/>

  <!-- Photo thumbnail strip -->
  <rect x="126" y="121" width="20" height="16" rx="3" fill="#374151"/>
  <rect x="149" y="121" width="20" height="16" rx="3" fill="#374151"/>
  <rect x="172" y="121" width="20" height="16" rx="3" fill="#374151"/>
  <!-- Camera icons in thumbnails -->
  <circle cx="136" cy="129" r="4" fill="#4b5563"/>
  <circle cx="136" cy="129" r="2.5" fill="#6d28d9" opacity="0.6"/>
  <circle cx="159" cy="129" r="4" fill="#4b5563"/>
  <circle cx="159" cy="129" r="2.5" fill="#6d28d9" opacity="0.5"/>
  <rect x="173" y="125" width="18" height="12" rx="2" fill="#1f2937"/>
  <text x="177" y="133" font-family="system-ui,sans-serif" font-size="7" fill="#6d28d9" opacity="0.8">+3</text>

  <!-- Bottom action bar -->
  <rect x="122" y="150" width="76" height="24" rx="0" fill="#1e1b4b"/>
  <rect x="122" y="162" width="76" height="12" rx="0" fill="#1e1b4b"/>
  <rect x="122" y="150" width="76" height="1" fill="#374151"/>

  <!-- PDF share button -->
  <rect x="130" y="155" width="28" height="11" rx="3" fill="#6d28d9"/>
  <text x="133" y="163" font-family="system-ui,sans-serif" font-size="6" fill="white" font-weight="600">PDF →</text>

  <!-- Camera button -->
  <rect x="163" y="155" width="26" height="11" rx="3" fill="#374151"/>
  <circle cx="176" cy="160.5" r="3.5" fill="none" stroke="#9ca3af" stroke-width="1"/>
  <circle cx="176" cy="160.5" r="1.5" fill="#9ca3af"/>

  <!-- Home indicator -->
  <rect x="142" y="168" width="36" height="3" rx="1.5" fill="#374151"/>

  <!-- Tech badges -->
  <rect x="4" y="164" width="38" height="12" rx="3" fill="#4c1d95" opacity="0.7"/>
  <text x="8" y="173" font-family="system-ui,sans-serif" font-size="6.5" fill="#c4b5fd">SwiftUI</text>
  <rect x="46" y="164" width="40" height="12" rx="3" fill="#1f2937" opacity="0.8"/>
  <text x="49" y="173" font-family="system-ui,sans-serif" font-size="6.5" fill="#9ca3af">SwiftData</text>
</svg>
