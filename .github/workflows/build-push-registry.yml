name: Build and Push to Local Registry

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: portfolio-registry-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: 192.168.1.158:5000
  IMAGE_NAME: portfolio
  IMAGE_LATEST: 192.168.1.158:5000/portfolio:latest
  IMAGE_SHA: 192.168.1.158:5000/portfolio:${{ github.sha }}

jobs:
  build-push-redeploy:
    name: Build, Push, and Redeploy
    runs-on:
      - self-hosted
      - Linux
      - portfolio
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."192.168.1.158:5000"]
              http = true
              insecure = true

      - name: Authenticate to registry (optional)
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${REGISTRY_USERNAME}" ] && [ -n "${REGISTRY_PASSWORD}" ]; then
            echo "${REGISTRY_PASSWORD}" | docker login "${REGISTRY}" -u "${REGISTRY_USERNAME}" --password-stdin
          else
            echo "Registry credentials not set; continuing without auth."
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_GIT_SHA=${{ github.sha }}
            APP_BUILD_TIME=${{ github.event.head_commit.timestamp || github.run_id }}
          provenance: false
          tags: |
            ${{ env.IMAGE_LATEST }}
            ${{ env.IMAGE_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pushed images
        run: |
          set -euo pipefail
          echo "Checking registry for pushed tags..."
          curl -sf "http://${REGISTRY}/v2/${IMAGE_NAME}/manifests/latest" -H "Accept: application/vnd.docker.distribution.manifest.v2+json" > /dev/null
          echo "✓ latest tag verified"
          curl -sf "http://${REGISTRY}/v2/${IMAGE_NAME}/manifests/${GITHUB_SHA}" -H "Accept: application/vnd.docker.distribution.manifest.v2+json" > /dev/null
          echo "✓ SHA tag verified"

      - name: Trigger Coolify redeploy webhook (API or signed manual fallback)
        env:
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_MANUAL_WEBHOOK_SECRET: ${{ secrets.COOLIFY_MANUAL_WEBHOOK_SECRET }}
          COOLIFY_MANUAL_WEBHOOK_URL: http://192.168.1.158:8000/webhooks/source/github/events/manual
        run: |
          set -euo pipefail
          if [ -n "${COOLIFY_DEPLOY_WEBHOOK}" ] && [ -n "${COOLIFY_API_TOKEN}" ]; then
            for attempt in 1 2 3; do
              response="$(curl -sS -X POST "${COOLIFY_DEPLOY_WEBHOOK}" \
                -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
                -H 'Accept: application/json')"
              deployment_uuid="$(echo "${response}" | jq -r '.deployments[0].deployment_uuid // empty' 2>/dev/null || true)"
              if [ -n "${deployment_uuid}" ]; then
                echo "Coolify API deploy queued (deployment ${deployment_uuid}) on attempt ${attempt}."
                exit 0
              fi
              echo "API webhook attempt ${attempt} failed. Response: ${response}"
              sleep $((attempt * 5))
            done
            echo "Coolify API webhook failed after 3 attempts."
            exit 1
          fi

          if [ -z "${COOLIFY_MANUAL_WEBHOOK_SECRET}" ]; then
            echo "No Coolify redeploy credentials set (API webhook or manual webhook secret). Skipping trigger."
            exit 0
          fi

          payload="$(jq -nc \
            --arg ref "refs/heads/${GITHUB_REF_NAME}" \
            --arg after "${GITHUB_SHA}" \
            --arg full "${GITHUB_REPOSITORY}" \
            '{ref:$ref, after:$after, repository:{full_name:$full}, commits:[{added:[],removed:[],modified:[".github/workflows/build-push-registry.yml"]}] }')"
          signature="$(printf '%s' "${payload}" | openssl dgst -sha256 -hmac "${COOLIFY_MANUAL_WEBHOOK_SECRET}" -binary | xxd -p -c 256)"

          response="$(curl -sS -X POST "${COOLIFY_MANUAL_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -H 'X-GitHub-Event: push' \
            -H "X-GitHub-Delivery: gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            -H "X-Hub-Signature-256: sha256=${signature}" \
            --data "${payload}")"

          deployment_uuid="$(echo "${response}" | jq -r '.[0].deployment_uuid // empty' 2>/dev/null || true)"
          if [ -n "${deployment_uuid}" ]; then
            echo "Coolify manual webhook deploy queued (deployment ${deployment_uuid})."
            exit 0
          fi

          echo "Coolify manual webhook trigger failed. Response: ${response}"
          exit 1
